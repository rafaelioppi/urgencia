<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Entrar')}"></head>
<body style="background:linear-gradient(135deg, var(--rs-blue) 0%, var(--rs-blue-dark) 50%, #061a33 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;">
<div class="container" style="max-width:420px;padding:2rem;">
    <div class="text-center mb-4 animate-fade-in">
        <div class="d-inline-flex align-items-center justify-content-center"
             style="width:72px;height:72px;border-radius:20px;background:rgba(255,255,255,.12);backdrop-filter:blur(4px);">
            <i class="bi bi-droplet-fill" style="color:var(--rs-gold);font-size:2.25rem;"></i>
        </div>
        <h1 class="h3 text-white mt-3 fw-bold" style="letter-spacing:-.02em;">SAUR</h1>
        <p class="text-white-50 small" style="letter-spacing:.02em;">Sistema de Avaliacao de Urgencia Renal</p>
    </div>
    <div class="card shadow-lg animate-fade-in-d1" style="border:none;border-radius:16px;backdrop-filter:blur(8px);background:rgba(255,255,255,.95);">
        <div class="card-body p-4">
            <div th:if="${param.bloqueado}" class="alert alert-warning py-2 border-0 rounded-3 d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-shield-lock-fill text-warning"></i> Conta temporariamente bloqueada por excesso de tentativas. Tente novamente em alguns minutos.
            </div>
            <div th:if="${param.error}" class="alert alert-danger py-2 border-0 rounded-3 d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-exclamation-triangle-fill"></i> Usuario ou senha invalidos.
            </div>
            <div th:if="${param.logout}" class="alert alert-success py-2 border-0 rounded-3 d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-check-circle-fill"></i> Sessao encerrada.
            </div>
            <div th:if="${msg}" class="alert alert-success py-2 border-0 rounded-3 d-flex align-items-center gap-2 mb-3" th:text="${msg}">
            </div>
            <div th:if="${erro}" class="alert alert-danger py-2 border-0 rounded-3 d-flex align-items-center gap-2 mb-3" th:text="${erro}">
            </div>
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" name="username" class="form-control border-start-0 ps-0" autofocus required placeholder="Seu login">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold small text-muted">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" name="password" class="form-control border-start-0 ps-0" id="senhaInput" required placeholder="Sua senha">
                        <button class="btn btn-light border" type="button" id="olhoSenha"
                                title="Mostrar/ocultar senha" aria-label="Mostrar/ocultar senha">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold rounded-pill shadow-sm">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Entrar
                </button>
                <div class="text-center mt-3">
                    <a th:href="@{/usuarios/esqueci-senha}" class="text-muted small text-decoration-none link-hover-primary">
                        <i class="bi bi-question-circle"></i> Esqueci minha senha
                    </a>
                </div>
            </form>
        </div>
    </div>
    <p class="text-center text-white-50 mt-4 animate-fade-in-d2" style="font-size:.75rem;">
        <i class="bi bi-shield-check me-1"></i> Central de Transplantes do Estado do Rio Grande do Sul
    </p>
    <p class="text-center text-white-50 mt-1" style="font-size:.7rem;opacity:.7;">Produzido por Rafael Elias Ioppi</p>
</div>
<script th:replace="~{layout :: scripts}"></script>
<script>
document.getElementById('olhoSenha')?.addEventListener('click', function () {
    var input = document.getElementById('senhaInput');
    var icon = this.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
});
</script>
</body>
</html>
