<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ops - SGPUR</title>
    <style>
        body { font-family: system-ui, Segoe UI, Arial, sans-serif; background: #f6f8fa;
               margin: 0; display: flex; min-height: 100vh; align-items: center; justify-content: center; }
        .box { background: #fff; border: 1px solid #e1e4e8; border-radius: 12px; padding: 40px;
               max-width: 460px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
        .icon { font-size: 3rem; }
        h1 { font-size: 1.4rem; margin: 12px 0 6px; }
        p { color: #6c757d; margin: 4px 0; }
        a.btn { display: inline-block; margin-top: 18px; background: #0d6efd; color: #fff;
                text-decoration: none; padding: 10px 18px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="box">
    <div class="icon">&#9888;&#65039;</div>
    <h1>Algo deu errado</h1>
    <p>
        <span th:text="${status}">500</span>
        <span th:if="${error}" th:text="' - ' + ${error}"></span>
    </p>
    <p style="font-size:.9rem" th:if="${message != null and message != 'No message available'}"
       th:text="${message}"></p>
    <a class="btn" th:href="@{/}">Voltar ao painel</a>
</div>
</body>
</html>
