<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title th:text="${titulo} ? ${titulo} + ' - SAUR' : 'SAUR'">SAUR</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/css/app.css(v=${#dates.format(#dates.createNow(),'yyyyMMddHHmmss')})}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-sgpur" th:fragment="navbar">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2"
           th:href="@{${#authorization.expression('hasRole(''AVALIADOR'')')} ? '/avaliador' : '/'}">
            <i class="bi bi-droplet-fill" style="font-size: 1.25rem;"></i>
            <span>SAUR</span>
            <span class="badge rounded-pill bg-warning text-dark" style="font-size:.6rem;opacity:.8;">UR</span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#nav" aria-controls="nav" aria-expanded="false">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','OPERADOR')"><a class="nav-link" th:href="@{/}"><i class="bi bi-grid-1x2-fill me-1"></i>Painel</a></li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','OPERADOR')"><a class="nav-link" th:href="@{/processos}">Processos</a></li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','OPERADOR')"><a class="nav-link" th:href="@{/controle-urgencias}">
                    <i class="bi bi-clock-history me-1"></i>Urgencias</a></li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','OPERADOR')"><a class="nav-link" th:href="@{/membros}">Membros</a></li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','OPERADOR')"><a class="nav-link" th:href="@{/relatorios/anual}">Relatorio anual</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/usuarios}">Usuarios</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/auditoria}">Auditoria</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item me-2" sec:authorize="hasRole('AVALIADOR')">
                    <a class="nav-link position-relative" th:href="@{/avaliador}"
                       title="Suas avaliacoes pendentes">
                        <i class="bi bi-bell-fill"></i>
                        <span th:if="${pendentesAvaliador > 0}"
                              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                              th:text="${pendentesAvaliador}">0</span>
                    </a>
                </li>
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle text-white d-flex align-items-center" href="#"
                       id="menuUsuario" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle me-1"></i><span sec:authentication="name">usuario</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="menuUsuario">
                        <li>
                            <a class="dropdown-item" th:href="@{/usuarios/minha-senha}">
                                <i class="bi bi-key me-2"></i>Alterar senha
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="m-0">
                                <button class="dropdown-item" type="submit">
                                    <i class="bi bi-box-arrow-right me-2"></i>Sair
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div th:fragment="flash" class="container mt-3">
    <div th:if="${msg}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${msg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${aviso}" class="alert alert-warning alert-dismissible fade show" role="alert">
        <span th:text="${aviso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<div th:fragment="footer" class="footer-sgpur mt-auto">
    <small>SAUR &mdash; Sistema de Avaliacao de Urgencia Renal &bull; Secretaria da Saude RS</small>
    <small class="d-block text-muted" style="font-size:.7rem;opacity:.7;">Produzido por Rafael Elias Ioppi</small>
</div>

<script th:fragment="scripts" th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
