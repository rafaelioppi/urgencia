<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Membros')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: flash}"></div>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Membros da Urgencia Renal</h1>
        <a th:href="@{/membros/novo}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Novo membro
        </a>
    </div>

    <!-- Indicador: tempo de resposta medio total dos avaliadores -->
    <div class="card mb-3">
        <div class="card-body d-flex flex-wrap align-items-center gap-3">
            <div class="d-flex align-items-center gap-2">
                <span class="d-inline-flex align-items-center justify-content-center rounded-circle"
                      style="width:44px;height:44px;background:var(--rs-blue-light);color:var(--rs-blue);">
                    <i class="bi bi-stopwatch fs-5"></i>
                </span>
                <div>
                    <div class="small text-muted">Tempo medio de resposta (geral)</div>
                    <div class="fs-4 fw-bold" style="color:var(--rs-blue);" th:text="${mediaGeralTexto}">—</div>
                </div>
            </div>
            <div class="vr d-none d-sm-block"></div>
            <div class="small text-muted">
                <div><span class="fw-semibold" th:text="${totalAvaliadosTempo}">0</span> pareceres respondidos</div>
                <div>Meta: <span class="fw-semibold" th:text="${prazoDias}">7</span> dias corridos</div>
            </div>
            <div th:if="${foraDoPrazoTempo > 0}" class="ms-sm-auto">
                <span class="badge bg-danger">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i>
                    <span th:text="${foraDoPrazoTempo}">0</span> fora do prazo
                </span>
            </div>
        </div>
    </div>

    <div class="card">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
            <tr><th>Instituicao</th><th>Nome</th><th>E-mail</th>
                <th class="text-center" title="Processos designados / avaliados / favoraveis">Designados / Avaliados / Fav.</th>
                <th class="text-center" title="Tempo medio de resposta em dias corridos">Tempo medio</th>
                <th>Situacao</th><th></th></tr>
            </thead>
            <tbody>
            <tr th:each="m : ${membros}" th:classappend="${!m.ativo} ? 'linha-inativa'">
                <td th:text="${m.instituicao}">SIGLA</td>
                <td th:text="${m.nome}">Nome
                    <span th:if="${m.coordenador}" class="badge bg-warning text-dark ms-1">Coordenador</span>
                </td>
                <td class="small text-muted" th:text="${m.email} ?: '-'"></td>
                <td class="text-center small">
                    <span class="badge bg-secondary" th:text="${stats.get(m.id)[0]}">0</span>
                    /
                    <span class="badge bg-info text-dark" th:text="${stats.get(m.id)[1]}">0</span>
                    /
                    <span class="badge bg-success" th:text="${stats.get(m.id)[2]}">0</span>
                </td>
                <td class="text-center">
                    <span th:if="${tempoTexto.containsKey(m.id)}"
                          class="badge"
                          th:classappend="${tempoForaPrazo.get(m.id)} ? 'bg-danger' : 'bg-light text-dark border'"
                          th:title="${tempoForaPrazo.get(m.id)} ? 'Acima da meta de ' + ${prazoDias} + ' dias' : 'Dentro da meta'"
                          th:text="${tempoTexto.get(m.id)}">—</span>
                    <span th:unless="${tempoTexto.containsKey(m.id)}" class="text-muted small">—</span>
                </td>
                <td>
                    <span class="badge" th:classappend="${m.ativo} ? 'bg-success' : 'bg-secondary'"
                          th:text="${m.ativo} ? 'Ativo' : 'Inativo'">Ativo</span>
                </td>
                <td class="text-end">
                    <a th:href="@{/membros/{id}/editar(id=${m.id})}" class="btn btn-sm btn-outline-secondary">Editar</a>
                    <form th:action="@{/membros/{id}/alternar-ativo(id=${m.id})}" method="post" class="d-inline">
                        <button class="btn btn-sm btn-outline-warning"
                                th:text="${m.ativo} ? 'Inativar' : 'Ativar'">Inativar</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${membros.isEmpty()}">
                <td colspan="7" class="text-center text-muted py-4">Nenhum membro cadastrado.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script th:replace="~{layout :: scripts}"></script>
</body>
</html>
