<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Novo processo')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: flash}"></div>

<div class="container my-4">
    <h1 class="h3 mb-3">Novo processo</h1>

    <form th:action="@{/processos}" th:object="${processo}" method="post" class="card">
        <div class="card-body">
            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                <div th:each="e : ${#fields.globalErrors()}" th:text="${e}"></div>
            </div>
            <div class="row g-3">
                <div class="col-md-3" th:unless="${numeracaoAutomatica}">
                    <label class="form-label">Numero (NN/AAAA) *</label>
                    <input type="text" th:field="*{numero}" class="form-control" placeholder="01/2026">
                    <div class="text-danger small" th:errors="*{numero}"></div>
                </div>
                <div class="col-md-3" th:if="${numeracaoAutomatica}">
                    <label class="form-label">Numero</label>
                    <input type="text" class="form-control" value="Gerado automaticamente" disabled>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Data da situacao especial *</label>
                    <input type="date" th:field="*{dataSituacaoEspecial}" class="form-control">
                    <div class="text-danger small" th:errors="*{dataSituacaoEspecial}"></div>
                </div>
            </div>

            <hr>
            <h2 class="h6 text-muted">Receptor (paciente)</h2>
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Nome do paciente *</label>
                    <input type="text" th:field="*{pacienteNome}" class="form-control">
                    <div class="text-danger small" th:errors="*{pacienteNome}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">RGCT / SNT *</label>
                    <input type="text" th:field="*{pacienteRgct}" class="form-control" placeholder="123456789-12345" required>
                    <div class="text-danger small" th:errors="*{pacienteRgct}"></div>
                </div>
            </div>

            <hr>
            <h2 class="h6 text-muted">Equipe solicitante</h2>
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Equipe / hospital solicitante *</label>
                    <input type="text" th:field="*{solicitanteEquipe}" class="form-control">
                    <div class="text-danger small" th:errors="*{solicitanteEquipe}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">E-mail do solicitante *</label>
                    <input type="email" th:field="*{solicitanteEmail}" class="form-control" required>
                    <div class="text-danger small" th:errors="*{solicitanteEmail}"></div>
                </div>
            </div>

            <hr>
            <h2 class="h6 text-muted">
                Medicos avaliadores
                <span class="badge bg-secondary" id="contador">0</span> /
                <span th:text="${totalAvaliadores}">3</span>
            </h2>
            <p class="small text-muted">Selecione exatamente <span th:text="${totalAvaliadores}">3</span> medicos.</p>
            <div class="row g-2">
                <div class="col-md-6" th:each="m : ${medicos}">
                    <div class="form-check border rounded p-2 ps-4">
                        <input class="form-check-input medico-check" type="checkbox" name="medicoIds"
                               th:value="${m.id}" th:id="'med' + ${m.id}">
                        <label class="form-check-label" th:for="'med' + ${m.id}" th:text="${m.rotulo}">Medico</label>
                    </div>
                </div>
            </div>

            <hr>
            <div>
                <label class="form-label">Observacoes</label>
                <textarea th:field="*{observacoes}" class="form-control" rows="2"></textarea>
            </div>
        </div>
        <div class="card-footer text-end">
            <a th:href="@{/processos}" class="btn btn-outline-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Cadastrar</button>
        </div>
    </form>
</div>

<script th:replace="~{layout :: scripts}"></script>
<script th:inline="javascript">
    const max = [[${totalAvaliadores}]];
    const checks = document.querySelectorAll('.medico-check');
    const contador = document.getElementById('contador');
    function atualizar() {
        const marcados = document.querySelectorAll('.medico-check:checked').length;
        contador.textContent = marcados;
        checks.forEach(c => { c.disabled = (!c.checked && marcados >= max); });
    }
    checks.forEach(c => c.addEventListener('change', atualizar));
    atualizar();
</script>
</body>
</html>
