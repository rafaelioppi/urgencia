<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Processos')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: flash}"></div>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4 animate-fade-in">
        <div>
            <h1 class="h4 fw-bold mb-1">Processos</h1>
            <p class="text-muted small mb-0">Gerencie as solicitacoes de urgencia renal</p>
        </div>
        <a th:href="@{/processos/novo}" class="btn btn-primary rounded-pill px-4 shadow-sm">
            <i class="bi bi-plus-lg me-1"></i> Novo processo
        </a>
    </div>

    <div class="card border-0 shadow-sm animate-fade-in-d1">
        <div class="card-body p-3">
            <form method="get" th:action="@{/processos}" class="row g-2 align-items-end">
                <div class="col-md-5">
                    <label class="form-label small fw-semibold text-muted mb-1">Busca</label>
                    <input type="text" name="q" class="form-control form-control-sm" th:value="${q}"
                           placeholder="Numero, paciente ou solicitante...">
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-semibold text-muted mb-1">Status</label>
                    <select name="status" class="form-select form-select-sm">
                        <option value="">Todos</option>
                        <option th:each="s : ${statusValores}" th:value="${s.name()}"
                                th:text="${s.descricao}"
                                th:selected="${statusSelecionado != null and statusSelecionado.name() == s.name()}"></option>
                    </select>
                </div>
                <div class="col-md-4 d-flex gap-2">
                    <button class="btn btn-primary btn-sm flex-grow-1">
                        <i class="bi bi-search me-1"></i> Filtrar
                    </button>
                    <a th:href="@{/processos}" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm mt-3 animate-fade-in-d2">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-3">Processo</th>
                    <th>Solicitante</th>
                    <th>Situacao</th>
                    <th class="pe-3">O que falta</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${processos}" class="animate-fade-in">
                    <td class="ps-3">
                        <a th:href="@{/processos/{id}(id=${p.id})}"
                           class="text-decoration-none fw-semibold text-primary"
                           th:text="${p.identificacao()}">00/0000 - Paciente - RGCT</a>
                    </td>
                    <td class="small">
                        <span class="badge badge-rs-blue fw-normal" th:text="${p.solicitanteEquipe}">Equipe</span>
                    </td>
                    <td>
                        <span class="badge rounded-pill" th:classappend="${p.status.bootstrapBadge}"
                              th:text="${p.status.descricao}">status</span>
                        <span th:if="${p.status.isFinalizado()}" title="Processo encerrado"
                              class="badge rounded-pill bg-dark ms-1">
                            <i class="bi bi-lock-fill"></i> Encerrado
                        </span>
                    </td>
                    <td class="small text-muted pe-3" th:text="${pendencias.get(p.id)}">pendencia</td>
                </tr>
                <tr th:if="${processos.isEmpty()}">
                    <td colspan="4" class="text-center text-muted py-5">
                        <i class="bi bi-inbox" style="font-size:2rem;display:block;margin-bottom:.5rem;"></i>
                        Nenhum processo encontrado
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav class="mt-3 animate-fade-in-d3" th:if="${totalPaginas > 1}">
        <ul class="pagination pagination-sm justify-content-center">
            <li class="page-item" th:classappend="${paginaAtual == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/processos(q=${q}, status=${statusSelecionado}, page=${paginaAtual - 1})}">
                    <i class="bi bi-chevron-left"></i> Anterior
                </a>
            </li>
            <li class="page-item active">
                <span class="page-link fw-semibold" th:text="${paginaAtual + 1}">1</span>
            </li>
            <li class="page-item" th:classappend="${paginaAtual + 1 >= totalPaginas} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/processos(q=${q}, status=${statusSelecionado}, page=${paginaAtual + 1})}">
                    Proxima <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

<div th:replace="~{layout :: footer}"></div>
<script th:replace="~{layout :: scripts}"></script>
</body>
</html>
