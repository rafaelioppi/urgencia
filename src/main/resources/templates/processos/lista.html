<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Processos')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: flash}"></div>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Processos</h1>
        <a th:href="@{/processos/novo}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Novo processo
        </a>
    </div>

    <form method="get" th:action="@{/processos}" class="row g-2 mb-3">
        <div class="col-md-6">
            <input type="text" name="q" class="form-control" th:value="${q}"
                   placeholder="Buscar por numero, paciente ou solicitante...">
        </div>
        <div class="col-md-3">
            <select name="status" class="form-select">
                <option value="">Todos os status</option>
                <option th:each="s : ${statusValores}" th:value="${s.name()}"
                        th:text="${s.descricao}"
                        th:selected="${statusSelecionado != null and statusSelecionado.name() == s.name()}"></option>
            </select>
        </div>
        <div class="col-md-3 d-flex gap-2">
            <button class="btn btn-outline-primary flex-grow-1"><i class="bi bi-search"></i> Filtrar</button>
            <a th:href="@{/processos}" class="btn btn-outline-secondary">Limpar</a>
        </div>
    </form>

    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Processo</th>
                    <th>Solicitante</th>
                    <th>Situacao</th>
                    <th>O que falta</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${processos}">
                    <td>
                        <a th:href="@{/processos/{id}(id=${p.id})}"
                           class="text-decoration-none fw-semibold" th:text="${p.identificacao()}">00/0000 - Paciente - RGCT</a>
                    </td>
                    <td class="small text-muted" th:text="${p.solicitanteEquipe}">Equipe</td>
                    <td>
                        <span class="badge" th:classappend="${p.status.bootstrapBadge}"
                              th:text="${p.status.descricao}">status</span>
                    </td>
                    <td class="small" th:text="${pendencias.get(p.id)}">pendencia</td>
                </tr>
                <tr th:if="${processos.isEmpty()}">
                    <td colspan="5" class="text-center text-muted py-4">Nenhum processo cadastrado.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav class="mt-3" th:if="${totalPaginas > 1}">
        <ul class="pagination pagination-sm justify-content-center">
            <li class="page-item" th:classappend="${paginaAtual == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/processos(q=${q}, status=${statusSelecionado}, page=${paginaAtual - 1})}">Anterior</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link">
                    <span th:text="${paginaAtual + 1}">1</span> / <span th:text="${totalPaginas}">1</span>
                </span>
            </li>
            <li class="page-item" th:classappend="${paginaAtual + 1 >= totalPaginas} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/processos(q=${q}, status=${statusSelecionado}, page=${paginaAtual + 1})}">Proxima</a>
            </li>
        </ul>
    </nav>
</div>

<script th:replace="~{layout :: scripts}"></script>
</body>
</html>
