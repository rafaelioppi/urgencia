<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Relatorio anual')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: flash}"></div>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Relatorio anual</h1>
    </div>

    <div class="card">
        <div class="card-header">
            <i class="bi bi-file-earmark-bar-graph"></i> Relatorio Geral de Urgencia Renal por ano
        </div>
        <div class="card-body">
            <p class="text-muted">
                Gera um PDF com o resumo (contagem por status) e a lista completa
                dos processos do ano selecionado.
            </p>

            <div th:if="${anos == null or anos.isEmpty()}" class="alert alert-info mb-0">
                <i class="bi bi-info-circle"></i>
                Ainda nao ha processos cadastrados. Cadastre um processo para
                gerar o relatorio anual.
            </div>

            <form th:if="${anos != null and !anos.isEmpty()}"
                  onsubmit="return false;" id="formAnual" class="row g-2 align-items-end">
                <div class="col-auto">
                    <label for="anoSelect" class="form-label">Ano</label>
                    <select id="anoSelect" class="form-select">
                        <option th:each="a : ${anos}" th:value="${a}" th:text="${a}">2026</option>
                    </select>
                </div>
                <div class="col-auto">
                    <button type="button" id="btnGerar" class="btn btn-primary">
                        <i class="bi bi-filetype-pdf"></i> Gerar PDF
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:replace="~{layout :: scripts}"></script>
<script th:inline="javascript" th:if="${anos != null and !anos.isEmpty()}">
    (function () {
        var base = /*[[@{/relatorios/anual}]]*/ '/relatorios/anual';
        var btn = document.getElementById('btnGerar');
        var sel = document.getElementById('anoSelect');
        if (btn && sel) {
            btn.addEventListener('click', function () {
                var ano = sel.value;
                if (ano) {
                    window.open(base + '/' + ano + '/pdf', '_blank');
                }
            });
        }
    })();
</script>
</body>
</html>
