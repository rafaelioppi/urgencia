<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Usuarios')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: flash}"></div>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Usuarios</h1>
        <a th:href="@{/usuarios/novo}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Novo usuario
        </a>
    </div>

    <div class="card">
        <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
            <tr><th>Login</th><th>Nome</th><th>Perfil</th><th>Situacao</th><th></th></tr>
            </thead>
            <tbody>
            <tr th:each="u : ${usuarios}" th:classappend="${!u.ativo} ? 'linha-inativa'">
                <td th:text="${u.username}">login</td>
                <td th:text="${u.nome}">Nome</td>
                <td><span class="badge bg-secondary" th:text="${u.perfil.descricao}">Perfil</span></td>
                <td>
                    <span th:if="${u.ativo}" class="text-nowrap">
                        <span th:replace="~{layout :: statusRotulo(true, 'Ativo')}"></span>
                    </span>
                    <span th:unless="${u.ativo}" class="text-nowrap">
                        <span th:replace="~{layout :: statusNa('Inativo')}"></span>
                    </span>
                </td>
                <td class="text-end">
                    <a th:href="@{/usuarios/{id}/editar(id=${u.id})}" class="btn btn-sm btn-outline-secondary">Editar</a>
                    <form th:action="@{/usuarios/{id}/alternar-ativo(id=${u.id})}" method="post" class="d-inline">
                        <button class="btn btn-sm btn-outline-warning"
                                th:text="${u.ativo} ? 'Inativar' : 'Ativar'">Inativar</button>
                    </form>
                    <form th:action="@{/usuarios/{id}/excluir(id=${u.id})}" method="post" class="d-inline form-excluir-usuario"
                          th:data-username="${u.username}">
                        <button class="btn btn-sm btn-outline-danger">Excluir</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        </div>
    </div>
</div>

<script th:replace="~{layout :: scripts}"></script>
<script>
document.querySelectorAll('.form-excluir-usuario').forEach(function (form) {
    form.addEventListener('submit', function (e) {
        var username = this.dataset.username;
        if (!confirm('Excluir usuario "' + username + '"? Esta acao nao pode ser desfeita.')) {
            e.preventDefault();
        }
    });
});
</script>
</body>
</html>
